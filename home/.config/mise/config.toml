[tools]
node = "lts"
bun = "latest"
deno = "latest"
"github:ajeetdsouza/zoxide" = "latest"
"github:BurntSushi/ripgrep" = "latest"
"github:sharkdp/bat" = "latest"
"github:cli/cli" = "latest"
"github:github/copilot-cli" = "latest"
"github:jkfran/killport" = "latest"
"github:junegunn/fzf" = "latest"
"github:microsoft/apm" = "latest"
"github:k1LoW/git-wt" = "latest"
"github:rossmacarthur/sheldon" = "latest"
"github:sharkdp/fd" = "latest"
"github:starship/starship" = "latest"
"github:suzuki-shunsuke/pinact" = "latest"
"github:sxyazi/yazi" = "latest"
"github:tmux/tmux-builds" = "latest"
"github:x-motemen/ghq" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@playwright/cli" = "latest"
"npm:editorconfig-checker" = "latest"
"npm:fixpack" = "latest"
"npm:hunkdiff" = "latest"
"npm:npmrc" = "latest"
"npm:ntn" = "latest"
"npm:opensrc" = "latest"
"npm:pnpm" = "latest"
"npm:yarn" = "latest"

[tools."github:jqlang/jq"]
version = "latest"

[tools."github:jqlang/jq".platforms]
macos-x64 = { asset_pattern = "jq-macos-amd64" }
macos-arm64 = { asset_pattern = "jq-macos-arm64" }

# openai/codex ships dozens of codex-prefixed release assets (codex-app-server,
# codex-command-runner, codex-symbols, ...), so mise's default asset-matching
# picks the right one but keeps its OS/arch-suffixed filename as the shim name
# (codex-aarch64-apple-darwin instead of codex). Pin the asset explicitly and
# rename it so `codex` resolves.
[tools."github:openai/codex"]
version = "latest"

[tools."github:openai/codex".platforms]
macos-arm64 = { asset_pattern = "codex-aarch64-apple-darwin.zst", rename_exe = "codex" }

[settings]
experimental = true
idiomatic_version_file_enable_tools = ['node']
# dotfiles.root is machine-local (each machine keeps this checkout at its
# own path), so it lives in conf.d/dotfiles-root.toml — generated by
# scripts/install.sh and gitignored. Settings values are literal (mise
# expands no env vars or templates in them), which is why the path can't be
# declared here, and conf.d fragments take precedence over this file.
dotfiles.default_mode = "symlink"

[settings.github]
# credential_command runs with mise's own shims stripped from PATH (to avoid
# recursive mise invocations), so a bare `gh` wouldn't resolve — gh is only
# ever installed as a mise shim here. Calling `mise which gh` from inside
# credential_command would work around that, but mise's own docs warn
# against it: gh is itself github:cli/cli, so resolving it could need a
# GitHub token too, recursing back into this same credential_command. mise's
# github backend keeps a `latest` symlink next to the resolved version
# (e.g. installs/github-cli-cli/latest -> ./2.96.0) that it repoints on every
# upgrade, so this path stays valid without invoking mise at all.
credential_command = "$HOME/.local/share/mise/installs/github-cli-cli/latest/bin/gh auth token"

[bootstrap.packages]
"brew:defaultbrowser" = "latest"
"brew:dockutil" = "latest"
"brew:git" = "latest"
"brew:tailscale" = "latest"
"brew:terminal-notifier" = "latest"
"brew:vim" = "latest"
"brew:zsh" = "latest"

[bootstrap.macos.dock]
autohide = true

[bootstrap.macos.defaults]
"NSGlobalDomain" = { AppleInterfaceStyle = "Dark", AppleShowAllExtensions = true, NSNavPanelExpandedStateForSaveMode = true }
"com.apple.dock" = { wvous-tr-corner = 2, wvous-tr-modifier = 0, wvous-bl-corner = 4, wvous-bl-modifier = 0, autohide-delay = 0 }
"com.apple.finder" = { _FXSortFoldersFirst = true, FXPreferredViewStyle = "clmv", CreateDesktop = false, NewWindowTarget = "PfHm", AppleShowAllFiles = true }

[dotfiles]
"~/.agents" = {}
"~/.apm/apm.lock.yaml" = {}
"~/.apm/apm.yml" = {}
"~/.claude/CLAUDE.md" = {}
"~/.claude/hooks" = {}
"~/.claude/rules" = {}
"~/.claude/settings.json" = {}
"~/.claude/skills" = {}
"~/.claude/statusline.sh" = {}
"~/.codex/AGENTS.md" = {}
"~/.codex/skills" = {}
"~/.config/fixpack" = {}
"~/.config/gh/config.yml" = {}
"~/.config/ghostty" = {}
"~/.config/hunk/config.toml" = {}
"~/.config/git" = {}
"~/.config/karabiner" = {}
"~/.config/mise" = {}
"~/.config/sheldon" = {}
"~/.config/tmux" = {}
"~/.config/vim" = {}
